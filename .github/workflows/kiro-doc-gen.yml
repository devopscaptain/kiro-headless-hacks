name: Kiro Documentation Generator

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/**'

permissions:
  contents: write

jobs:
  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Generate documentation
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          KIRO_LOG_NO_COLOR: "1"
        run: |
          kiro-cli chat \
            --no-interactive \
            --agent doc-generator \
            --trust-all-tools \
            "Scan this repository and update the documentation. If docs/ directory exists, update files there. If README.md exists, update it with any new public APIs or changed interfaces. Create documentation for any undocumented public modules."

      - name: Push documentation updates
        run: |
          if git diff --quiet; then
            echo "No documentation changes detected."
            exit 0
          fi

          BRANCH="docs/auto-update-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "docs: auto-update documentation via Kiro

          Generated by Kiro doc-generator agent.
          Triggered by push to main."
          git push -u origin "$BRANCH"

          echo "📚 Documentation updates pushed to branch: $BRANCH"

name: Kiro Documentation Generator

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Generate documentation
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          KIRO_LOG_NO_COLOR: "1"
        run: |
          kiro-cli chat \
            --no-interactive \
            --agent doc-generator \
            --trust-tools=read,grep,write \
            "Scan this repository and update the documentation. If docs/ directory exists, update files there. If README.md exists, update it with any new public APIs or changed interfaces. Create documentation for any undocumented public modules."

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with documentation updates
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="docs/auto-update-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "docs: auto-update documentation via Kiro

          Generated by Kiro doc-generator agent.
          Triggered by push to main."
          git push -u origin "$BRANCH"

          gh pr create \
            --title "docs: auto-update documentation" \
            --body "## 📚 Automated Documentation Update

          This PR was generated by the **Kiro doc-generator** agent after a push to \`main\`.

          ### What changed
          Documentation was scanned and updated to reflect the current codebase.

          ### Review checklist
          - [ ] Generated docs are accurate
          - [ ] No sensitive information exposed
          - [ ] Formatting looks correct

          ---
          *Powered by [Kiro Headless Mode](https://kiro.dev/docs/cli/headless/)*" \
            --base main \
            --head "$BRANCH"

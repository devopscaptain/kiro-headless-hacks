name: Kiro Dependency Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Run dependency audit
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          KIRO_LOG_NO_COLOR: "1"
        run: |
          kiro-cli chat \
            --no-interactive \
            --agent dependency-auditor \
            --trust-all-tools \
            "Audit all dependency files in this repository (package.json, requirements.txt, go.mod, Cargo.toml, pom.xml, etc.). Run any available audit commands (npm audit, pip-audit, etc.) if the tooling is present. Report vulnerabilities, outdated packages, and license issues." > /tmp/audit-raw.txt 2>&1 || true

          node .github/scripts/clean-kiro-output.js /tmp/audit-raw.txt /tmp/audit-report.md

      - name: Create or update audit issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/audit-report.md', 'utf8');
            const today = new Date().toISOString().split('T')[0];

            const title = `🔍 Dependency Audit Report — ${today}`;
            const body = [
              '## 🔍 Weekly Dependency Audit',
              '',
              `> Generated on **${today}** by [Kiro Headless Mode](https://kiro.dev/docs/cli/headless/)`,
              '',
              report,
              '',
              '---',
              '*Powered by [Kiro CLI](https://kiro.dev/cli/) • Runs weekly on Mondays*'
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependency-audit',
            });

            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                title: title,
                body: body,
              });
              console.log(`Updated issue #${issues[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['dependency-audit', 'automated'],
              });
              console.log('Created new audit issue');
            }

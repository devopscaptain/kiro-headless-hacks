name: Kiro Dependency Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Run dependency audit
        id: audit
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          KIRO_LOG_NO_COLOR: "1"
        run: |
          kiro-cli chat \
            --no-interactive \
            --agent dependency-auditor \
            --trust-all-tools \
            "Audit all dependency files in this repository (package.json, requirements.txt, go.mod, Cargo.toml, pom.xml, etc.). Run any available audit commands (npm audit, pip-audit, etc.) if the tooling is present. Report vulnerabilities, outdated packages, and license issues." > /tmp/audit-raw.txt 2>&1 || true

          # Strip ANSI escape codes and tool invocation noise
          sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' /tmp/audit-raw.txt \
            | sed -E \
              -e '/^(Reading |Batch |↱ |⋮ |Invoking |[0-9]+\. .*kiro_default)/d' \
              -e '/^(✓ |Successfully |> )/d' \
              -e '/^\(using tool:/d' \
              -e '/^- Completed in/d' \
              -e '/^- Summary:/d' \
            | sed '/./,$!d' > /tmp/audit-report.md

      - name: Create or update audit issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let report = fs.readFileSync('/tmp/audit-report.md', 'utf8');
            const today = new Date().toISOString().split('T')[0];

            // Strip any remaining ANSI escape codes
            report = report.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
            report = report.replace(/[━↱⋮]/g, '');
            report = report.replace(/\n{3,}/g, '\n\n');

            const title = `🔍 Dependency Audit Report — ${today}`;
            const body = [
              '## 🔍 Weekly Dependency Audit',
              '',
              `> Generated on **${today}** by [Kiro Headless Mode](https://kiro.dev/docs/cli/headless/)`,
              '',
              report,
              '',
              '---',
              '*Powered by [Kiro CLI](https://kiro.dev/cli/) • Runs weekly on Mondays*'
            ].join('\n');

            // Check for existing open audit issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependency-audit',
            });

            if (issues.length > 0) {
              // Update the most recent open audit issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                title: title,
                body: body,
              });
              console.log(`Updated issue #${issues[0].number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['dependency-audit', 'automated'],
              });
              console.log('Created new audit issue');
            }

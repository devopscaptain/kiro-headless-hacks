name: Kiro PR Summary

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: kiro-summary-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  summarize:
    name: Generate PR Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Collect PR metadata
        id: meta
        run: |
          STAT=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD --stat)
          COMMITS=$(git log origin/${{ github.event.pull_request.base.ref }}..HEAD --oneline)

          {
            echo "### Commits"
            echo '```'
            echo "$COMMITS"
            echo '```'
            echo ""
            echo "### Changed Files (diff)"
            echo '```'
            echo "$STAT"
            echo '```'
          } > /tmp/pr-meta.txt

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Generate PR summary
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          KIRO_LOG_NO_COLOR: "1"
        run: |
          META=$(cat /tmp/pr-meta.txt)

          kiro-cli chat \
            --no-interactive \
            --trust-all-tools \
            "Generate a summary of this repository and the pull request changes.

          First, read ALL source code files in these directories to understand the full codebase:
          - nodejs-app/ (Express.js API — all files under src/, package.json, .env)
          - terraform/ (AWS infrastructure — main.tf, variables.tf)
          - docker/ (Dockerfile, docker-compose.yml)

          Then review the PR diff context below to understand what changed in this specific PR:

          ${META}

          Format the summary as:
          1. **Repository overview** — What this repo contains (1-2 sentences)
          2. **What changed in this PR** — A 2-3 sentence overview of the diff
          3. **Key changes** — Bullet list of the important modifications
          4. **Codebase health** — Brief note on any security/quality issues spotted across the full codebase
          5. **Testing notes** — What should reviewers test manually

          Keep it useful for reviewers who haven't seen the code yet." > /tmp/pr-raw.txt 2>&1 || true

          node .github/scripts/clean-kiro-output.js /tmp/pr-raw.txt /tmp/pr-summary.md

      - name: Update PR description
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('/tmp/pr-summary.md', 'utf8');

            const currentBody = context.payload.pull_request.body || '';
            const marker = '<!-- kiro-summary-start -->';
            const endMarker = '<!-- kiro-summary-end -->';

            const kiroSection = [
              marker,
              '## 📋 AI-Generated Summary',
              '',
              summary,
              '',
              `*Generated by [Kiro CLI](https://kiro.dev/cli/) • Updated at ${new Date().toISOString()}*`,
              endMarker,
            ].join('\n');

            let newBody;
            if (currentBody.includes(marker)) {
              const regex = new RegExp(`${marker}[\\s\\S]*?${endMarker}`);
              newBody = currentBody.replace(regex, kiroSection);
            } else {
              newBody = currentBody + '\n\n' + kiroSection;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: newBody,
            });

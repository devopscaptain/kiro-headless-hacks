name: Kiro Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: kiro-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Run Kiro code review
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          KIRO_LOG_NO_COLOR: "1"
        run: |
          kiro-cli chat \
            --no-interactive \
            --agent code-reviewer \
            --trust-all-tools \
            "Perform a full security and code quality review of this entire repository.

          Review ALL source code files across these directories:
          - nodejs-app/ (Express.js API — server, routes, middleware, database, .env, package.json)
          - terraform/ (AWS infrastructure — main.tf, variables.tf)
          - docker/ (Dockerfile, docker-compose.yml)

          Read every file in each directory. Do NOT limit your review to recently changed files.
          Check for security vulnerabilities, bugs, performance issues, and code quality problems.
          Provide actionable feedback organized by severity with file and line references." > /tmp/kiro-raw.txt 2>&1 || true

          node .github/scripts/clean-kiro-output.js /tmp/kiro-raw.txt /tmp/kiro-review.md

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/kiro-review.md', 'utf8');

            const body = [
              '## 🤖 Kiro Code Review',
              '',
              '> Full repository review using [Kiro Headless Mode](https://kiro.dev/docs/cli/headless/)',
              '',
              review,
              '',
              '---',
              `*Powered by [Kiro CLI](https://kiro.dev/cli/) • Run #${context.runNumber}*`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.body.includes('## 🤖 Kiro Code Review') && c.user.type === 'Bot'
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

name: Kiro Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: kiro-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Generate diff for context
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD --stat)
          echo "## Changed Files" > /tmp/pr-context.txt
          echo '```' >> /tmp/pr-context.txt
          echo "$DIFF" >> /tmp/pr-context.txt
          echo '```' >> /tmp/pr-context.txt
          echo "" >> /tmp/pr-context.txt

          FULL_DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD)
          echo "## Full Diff" >> /tmp/pr-context.txt
          echo '```diff' >> /tmp/pr-context.txt
          echo "$FULL_DIFF" | head -c 50000 >> /tmp/pr-context.txt
          echo '```' >> /tmp/pr-context.txt

          FILE_COUNT=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD --name-only | wc -l | tr -d ' ')
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Run Kiro code review
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          KIRO_LOG_NO_COLOR: "1"
        run: |
          PR_CONTEXT=$(cat /tmp/pr-context.txt)

          kiro-cli chat \
            --no-interactive \
            --agent code-reviewer \
            --trust-all-tools \
            "Review the code changes in this pull request. Here is the diff context:

          ${PR_CONTEXT}

          Focus on the changed files. Read each changed file fully before reviewing. Provide actionable feedback organized by severity." > /tmp/kiro-raw.txt 2>&1 || true

          node .github/scripts/clean-kiro-output.js /tmp/kiro-raw.txt /tmp/kiro-review.md

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/kiro-review.md', 'utf8');
            const fileCount = '${{ steps.diff.outputs.file_count }}';

            const body = [
              '## 🤖 Kiro Code Review',
              '',
              `> Reviewed **${fileCount}** changed file(s) using [Kiro Headless Mode](https://kiro.dev/docs/cli/headless/)`,
              '',
              review,
              '',
              '---',
              `*Powered by [Kiro CLI](https://kiro.dev/cli/) • Run #${context.runNumber}*`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.body.includes('## 🤖 Kiro Code Review') && c.user.type === 'Bot'
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
